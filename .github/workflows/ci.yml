name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build bot
        run: |
          go build -trimpath \
            -ldflags="-s -w \
              -X github.com/xsyetopz/go-mamusiabtw/internal/buildinfo.Version=${GITHUB_SHA} \
              -X github.com/xsyetopz/go-mamusiabtw/internal/buildinfo.Repository=https://github.com/${GITHUB_REPOSITORY}" \
            ./cmd/mamusiabtw

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install workspace deps
        run: bun install

      - name: Build dashboard
        run: bun --cwd apps/dashboard run build

      - name: Build public site
        env:
          MAMUSIABTW_SITE_BASE: /${{ github.event.repository.name }}/
        run: bun --cwd apps/site run build
